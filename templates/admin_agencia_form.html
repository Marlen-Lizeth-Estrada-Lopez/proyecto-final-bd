<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>COOVALLUNA - {{ 'Editar' if agencia else 'Nueva' }} Agencia</title>
</head>
<body style="margin: 0; font-family: Arial, sans-serif; background: #f0f0f0;">

  <div style="display: flex; min-height: 100vh;">

    <!-- BARRA LATERAL SIMPLIFICADA -->
    <div style="
      width: 140px;
      background: #e0e0e0;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    ">
      <p style="font-weight: bold; margin: 0 0 8px 0; font-size: 13px;">Vista Administrador</p>
      <a href="/admin/agencias" style="display: block; text-align: center; background: white; border: 1.5px solid #888; border-radius: 6px; padding: 5px 8px; font-size: 13px; text-decoration: none; color: black;">
        ← Volver
      </a>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div style="flex: 1; padding: 24px 32px;">

      <h2 style="margin: 0 0 20px 0;">{{ 'Editar' if agencia else 'Nueva' }} Agencia</h2>

      <div style="background: white; border: 1px solid #ccc; border-radius: 6px; padding: 20px 24px;">

        <form method="POST">

          {% if not agencia %}
          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Código</label>
            <input type="number" name="cod" required style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>
          {% endif %}

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Nombre</label>
            <input type="text" name="nombre" value="{{ agencia[1] if agencia else '' }}" required style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Municipio</label>
            <input type="text" name="munic" value="{{ agencia[2] if agencia else '' }}" required style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Teléfono</label>
            <input type="text" name="tel" value="{{ agencia[3] if agencia else '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Fecha apertura</label>
            <input type="date" name="fecha_ape" value="{{ agencia[4] if agencia else '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Dirección</label>
            <input type="text" name="dir" value="{{ agencia[5] if agencia else '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="display: flex; gap: 12px; margin-top: 8px;">
            <button type="submit" style="background-color: #3a9ae8; color: white; border: none; border-radius: 6px; padding: 8px 24px; font-size: 13px; cursor: pointer;">
              Guardar
            </button>
            <a href="/admin/agencias" style="background-color: #ddd; color: black; border: none; border-radius: 6px; padding: 8px 24px; font-size: 13px; text-decoration: none; display: inline-block;">
              Cancelar
            </a>
          </div>

        </form>

      </div>

    </div>
  </div>

</body>
</html>
