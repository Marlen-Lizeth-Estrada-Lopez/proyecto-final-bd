<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>COOVALLUNA - Nuevo Empleado</title>
</head>
<body style="margin: 0; font-family: Arial, sans-serif; background: #f0f0f0;">

  <div style="display: flex; min-height: 100vh;">

    <!-- BARRA LATERAL (simplificada) -->
    <div style="
      width: 140px;
      background: #e0e0e0;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    ">
      <p style="font-weight: bold; margin: 0 0 8px 0; font-size: 13px;">Vista Administrador</p>
      <a href="/admin/empleados" 
         style="display: block; text-align: center; background: white; border: 1.5px solid #888; border-radius: 6px; padding: 5px 8px; font-size: 13px; text-decoration: none; color: black;">
         ← Volver
      </a>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div style="flex: 1; padding: 24px 32px;">

      <h2 style="margin: 0 0 20px 0;">Nuevo Empleado</h2>

      <div style="background: white; border: 1px solid #ccc; border-radius: 6px; padding: 20px 24px;">

        <form method="POST">

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">ID</label>
            <input type="number" name="id" required style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Primer nombre</label>
            <input type="text" name="prim_nom" required style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Segundo nombre</label>
            <input type="text" name="seg_nom" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Primer apellido</label>
            <input type="text" name="prim_ape" required style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Segundo apellido</label>
            <input type="text" name="seg_ape" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Cargo</label>
            <select name="cargo" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
              <option value="Asesor">Asesor</option>
              <option value="Cajero">Cajero</option>
              <option value="Director">Director</option>
              <option value="Promotor">Promotor</option>
            </select>
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Fecha ingreso</label>
            <input type="date" name="fecha_ingre" required style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Salario base</label>
            <input type="number" step="0.01" name="sal_base" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Correo corporativo</label>
            <input type="email" name="correo_corp" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Estado laboral</label>
            <select name="est_lab" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
              <option value="activo">activo</option>
              <option value="en licencia">en licencia</option>
              <option value="retirado">retirado</option>
            </select>
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Agencia</label>
            <select name="cod_agencia" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
              {% for ag in agencias %}
              <option value="{{ ag[0] }}">{{ ag[1] }}</option>
              {% endfor %}
            </select>
          </div>

          <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">Supervisor (opcional)</label>
            <select name="supervisor_id" style="width: 100%; padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px;">
              <option value="">-- Sin supervisor --</option>
              {% for s in supervisores %}
              <option value="{{ s[0] }}">{{ s[1] }}</option>
              {% endfor %}
            </select>
          </div>

          <div style="display: flex; gap: 12px; margin-top: 8px;">
            <button type="submit" style="background-color: #3a9ae8; color: white; border: none; border-radius: 6px; padding: 8px 24px; font-size: 13px; cursor: pointer;">
              Guardar
            </button>
            <a href="/admin/empleados" style="background-color: #ddd; color: black; border: none; border-radius: 6px; padding: 8px 24px; font-size: 13px; text-decoration: none; display: inline-block;">
              Cancelar
            </a>
          </div>

        </form>

      </div>

    </div>
  </div>

</body>
</html>
