<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>COOVALLUNA - Créditos</title>
</head>
<body style="margin: 0; font-family: Arial, sans-serif; background: #f0f0f0;">

  <div style="display: flex; min-height: 100vh;">

    <!-- BARRA LATERAL -->
    <div style="
      width: 140px;
      background: #e0e0e0;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    ">
      <a href="{{ '/admin' if session.get('rol') == 'administrador' else '/asesor' }}" 
         style="display: block; text-align: center; background: white; border: 1.5px solid #888; border-radius: 6px; padding: 5px 8px; font-size: 13px; text-decoration: none; color: black;">
         ← Volver
      </a>
      <a href="/creditos/nuevo" 
         style="display: block; text-align: center; background: white; border: 1.5px solid #888; border-radius: 6px; padding: 5px 8px; font-size: 13px; text-decoration: none; color: black;">
         Nuevo crédito
      </a>
      <a href="/pagos/nuevo" 
         style="display: block; text-align: center; background: white; border: 1.5px solid #888; border-radius: 6px; padding: 5px 8px; font-size: 13px; text-decoration: none; color: black;">
         Registrar pago
      </a>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div style="flex: 1; padding: 24px 32px;">

      <h2 style="margin: 0 0 20px 0;">Gestión de Créditos</h2>

      <div style="border: 1px solid #ccc; border-radius: 6px; overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
          <thead>
            <tr style="background: #d8d8d8;">
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">N° Radicado</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Titular</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Línea</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Valor Aprobado</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Estado</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Plazo</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Agencia</th>
            </tr>
          </thead>
          <tbody>
            {% for c in creditos %}
            <tr style="border-top: 1px solid #eee; background: {{ '#f9f9f9' if loop.index is odd else 'white' }};">
              <td style="padding: 8px 12px;">{{ c[0] }}</td>
              <td style="padding: 8px 12px;">{{ c[1] }}</td>
              <td style="padding: 8px 12px;">{{ c[2] }}</td>
              <td style="padding: 8px 12px;">${{ c[3] if c[3] else '-' }}</td>
              <td style="padding: 8px 12px;">{{ c[4] }}</td>
              <td style="padding: 8px 12px;">{{ c[5] }} meses</td>
              <td style="padding: 8px 12px;">{{ c[6] }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

    </div>
  </div>

</body>
</html>
