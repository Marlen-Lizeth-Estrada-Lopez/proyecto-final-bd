<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reporte 5 - Historial Pagos</title>
</head>
<body style="margin: 0; font-family: Arial, sans-serif; background: #f0f0f0;">

  <div style="display: flex; min-height: 100vh;">

    <!-- BARRA LATERAL -->
    <div style="
      width: 140px;
      background: #e0e0e0;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    ">
      <a href="{{ '/admin' if session.get('rol') == 'administrador' else '/asesor' }}" style="display: block; text-align: center; background: white; border: 1.5px solid #888; border-radius: 6px; padding: 5px 8px; font-size: 13px; text-decoration: none; color: black;">← Volver</a>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div style="flex: 1; padding: 24px 32px;">

      <h2 style="margin: 0 0 20px 0;">Historial de Pagos de Crédito</h2>

      <!-- Formulario -->
      <div style="background: white; border: 1px solid #ccc; border-radius: 6px; padding: 20px 24px; margin-bottom: 24px;">
        <form method="POST" style="display: flex; gap: 16px; align-items: flex-end;">

          <div style="display: flex; flex-direction: column; gap: 4px; font-size: 13px;">
            <label>Número de crédito:</label>
            <input type="number" name="num_credito" required style="padding: 5px 8px; border: 1px solid #aaa; border-radius: 4px; font-size: 13px; width: 160px;" />
          </div>

          <button type="submit" style="background-color: #3a9ae8; color: white; border: none; border-radius: 6px; padding: 8px 24px; font-size: 13px; cursor: pointer;">
            Consultar
          </button>

        </form>
      </div>

      <!-- Resultados -->
      {% if pagos %}
      <div style="border: 1px solid #ccc; border-radius: 6px; overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
          <thead>
            <tr style="background: #d8d8d8;">
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">N° Cuota</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Fecha Programada</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Fecha Real Pago</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Valor Pagado</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Estado</th>
              <th style="text-align: left; padding: 8px 12px; font-weight: normal;">Alerta</th>
            </tr>
          </thead>
          <tbody>
            {% for p in pagos %}
            <tr style="border-top: 1px solid #eee; background: {{ '#f9f9f9' if loop.index is odd else 'white' }};">
              <td style="padding: 8px 12px;">{{ p[0] }}</td>
              <td style="padding: 8px 12px;">{{ p[1] }}</td>
              <td style="padding: 8px 12px;">{{ p[2] if p[2] else '-' }}</td>
              <td style="padding: 8px 12px;">{{ '$' + p[3]|string if p[3] else '-' }}</td>
              <td style="padding: 8px 12px;">{{ p[4] }}</td>
              <td style="padding: 8px 12px; color: red;">{{ p[5] if p[5] else '' }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      {% endif %}

    </div>
  </div>

</body>
</html>
